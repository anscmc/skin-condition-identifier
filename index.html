<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermDx AI | Clinical Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        canvas { border-radius: 1rem; width: 100% !important; height: auto !important; border: 2px solid #334155; }
        .start-btn { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        .start-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(37, 99, 235, 0.5); }
    </style>
</head>
<body class="p-6 max-w-md mx-auto min-h-screen flex flex-col">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold tracking-tight text-blue-400">DermDx AI</h1>
        <p class="text-[10px] text-slate-400 uppercase tracking-[0.2em] mt-1 font-semibold">Clinical Decision Support Utility</p>
    </div>

    <div id="webcam-container" class="relative mb-6 shadow-2xl overflow-hidden rounded-3xl bg-slate-800 flex items-center justify-center min-h-[350px]">
        <button id="init-button" type="button" onclick="init()" class="start-btn absolute z-10 px-10 py-5 rounded-full font-bold shadow-2xl tracking-wide">
            START ANALYSIS
        </button>
    </div>

    <div id="label-container" class="space-y-4">
        <div class="bg-slate-800/40 border border-slate-700/50 p-8 rounded-2xl text-center">
            <p class="text-slate-500 text-sm font-medium">Ready for clinical input.<br>Point camera at affected area.</p>
        </div>
    </div>

    <div class="mt-auto pt-8">
        <div class="mt-8 text-[10px] text-slate-600 text-center leading-relaxed">
            PROTOTYPE ONLY. NOT FOR DIAGNOSIS.<br>
            PRIVACY-BY-DESIGN: ON-DEVICE INFERENCE ACTIVE.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "./"; 
        let model, webcam, labelContainer, maxPredictions;
        
        let predictionHistory = [];
        const HISTORY_SIZE = 10; 
        const CONFIDENCE_THRESHOLD = 0.70;

        async function init() {
            document.getElementById("init-button").style.display = "none";
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = false; 
            webcam = new tmImage.Webcam(400, 400, flip); 
            
            await webcam.setup({ facingMode: "environment" }); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            predictionHistory.push(prediction);
            if (predictionHistory.length > HISTORY_SIZE) predictionHistory.shift();

            let averagedResults = [];
            let topClass = { name: "", prob: 0 };

            for (let i = 0; i < maxPredictions; i++) {
                let sum = 0;
                for (let j = 0; j < predictionHistory.length; j++) {
                    sum += predictionHistory[j][i].probability;
                }
                let avgProb = sum / predictionHistory.length;
                averagedResults.push({ name: prediction[i].className, prob: avgProb });
                
                if (avgProb > topClass.prob) {
                    topClass = { name: prediction[i].className, prob: avgProb };
                }
            }

            if (topClass.name === "Neither" || topClass.prob < CONFIDENCE_THRESHOLD) {
                labelContainer.innerHTML = `
                    <div class="bg-slate-900 border-2 border-dashed border-slate-700 p-10 rounded-3xl text-center shadow-inner">
                        <span class="text-slate-500 font-semibold italic text-lg block">Scanning...</span>
                        <p class="text-[9px] text-slate-600 mt-3 uppercase tracking-[0.3em] font-bold">Waiting for conclusive clinical markers</p>
                    </div>`;
            } else {
                let resultsHTML = "";
                averagedResults.forEach(res => {
                    if (res.name !== "Neither") {
                        const isWinner = res.name === topClass.name;
                        const probDisplay = (res.prob * 100).toFixed(0);
                        
                        resultsHTML += `
                            <div class="bg-slate-800 border-2 ${isWinner ? 'border-blue-500 shadow-lg shadow-blue-500/20' : 'border-slate-700/50'} p-6 rounded-2xl flex justify-between items-center transition-all duration-300">
                                <span class="${isWinner ? 'text-white font-bold text-lg' : 'text-slate-400 font-medium'}">${res.name}</span>
                                <div class="flex items-center">
                                    <span class="${isWinner ? 'text-blue-400' : 'text-slate-500'} font-mono text-3xl font-bold">${probDisplay}%</span>
                                </div>
                            </div>`;
                    }
                });
                labelContainer.innerHTML = resultsHTML;
            }
        }
    </script>
</body>
</html>
