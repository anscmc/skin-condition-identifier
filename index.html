<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skin AI Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-4">

    <header class="text-center my-6">
        <h1 class="text-2xl font-bold text-blue-400">Skin Condition AI</h1>
        <p class="text-slate-400 text-sm italic">Confidential Local Analysis</p>
    </header>

    <div id="webcam-container" class="relative rounded-2xl overflow-hidden border-4 border-slate-700 bg-black w-full max-w-sm aspect-square shadow-2xl">
        <div id="placeholder" class="absolute inset-0 flex items-center justify-center text-slate-500 italic">
            Camera inactive
        </div>
    </div>

    <div class="mt-8 w-full max-w-sm flex flex-col gap-3">
        <button type="button" onclick="init()" id="start-btn" 
            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all active:scale-95 shadow-lg">
            Start Analysis
        </button>

        <div id="active-controls" class="hidden flex flex-col gap-3">
            <button type="button" onclick="toggleFreeze()" id="freeze-btn" 
                class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl transition-all shadow-md">
                Freeze Results
            </button>
            <button type="button" onclick="captureReport()" id="capture-btn" 
                class="w-full bg-green-700 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition-all shadow-md flex items-center justify-center gap-2">
                Save Report Image
            </button>
        </div>

        <div id="label-container" class="mt-4 space-y-3"></div>
    </div>

    <canvas id="capture-canvas" width="400" height="600" class="hidden"></canvas>

    <script type="text/javascript">
        const URL = "./"; 
        let model, webcam, labelContainer, maxPredictions;
        let predictionHistory = [];
        const HISTORY_SIZE = 10;
        let isFrozen = false;
        let lastAveragedResults = [];

        async function init() {
            const startBtn = document.getElementById("start-btn");
            startBtn.disabled = true;
            startBtn.innerHTML = "Loading...";

            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(400, 400, false); 
            await webcam.setup({ facingMode: "environment" }); 
            await webcam.play();
            
            document.getElementById("placeholder").classList.add("hidden");
            document.getElementById("active-controls").classList.remove("hidden");
            startBtn.classList.add("hidden");

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            webcam.canvas.classList.add("w-full", "h-full", "object-cover");
            
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }

            window.requestAnimationFrame(loop);
        }

        async function loop() {
            if (!isFrozen) {
                webcam.update();
                await predict();
            }
            window.requestAnimationFrame(loop);
        }

        function toggleFreeze() {
            isFrozen = !isFrozen;
            const btn = document.getElementById("freeze-btn");
            btn.innerHTML = isFrozen ? "Resume Analysis" : "Freeze Results";
            btn.classList.toggle("bg-red-600", isFrozen);
        }

        async function predict() {
            const currentPrediction = await model.predict(webcam.canvas);
            predictionHistory.push(currentPrediction);
            if (predictionHistory.length > HISTORY_SIZE) predictionHistory.shift();

            lastAveragedResults = [];

            for (let i = 0; i < maxPredictions; i++) {
                let sum = 0;
                for (let j = 0; j < predictionHistory.length; j++) {
                    sum += predictionHistory[j][i].probability;
                }
                const avgProb = sum / predictionHistory.length;
                const probability = (avgProb * 100).toFixed(0);
                
                lastAveragedResults.push({ name: currentPrediction[i].className, prob: probability });

                const colorClass = avgProb > 0.7 ? 'text-green-400' : 'text-blue-300';
                labelContainer.childNodes[i].innerHTML = `
                    <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl flex justify-between items-center">
                        <span class="font-medium text-slate-200">${currentPrediction[i].className}</span>
                        <span class="font-mono text-xl font-bold ${colorClass}">${probability}%</span>
                    </div>`;
            }
        }

        function captureReport() {
            const canvas = document.getElementById("capture-canvas");
            const ctx = canvas.getContext("2d");

            // 1. Draw Camera Frame
            ctx.fillStyle = "#0f172a"; // Slate-900
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(webcam.canvas, 0, 0, 400, 400);

            // 2. Draw Report Background
            ctx.fillStyle = "#1e293b"; // Slate-800
            ctx.fillRect(0, 400, 400, 200);

            // 3. Add Text Metadata
            ctx.fillStyle = "#38bdf8"; // Blue-400
            ctx.font = "bold 20px Arial";
            ctx.fillText("AI CLASSIFICATION REPORT", 20, 440);
            
            ctx.fillStyle = "#cbd5e1"; // Slate-300
            ctx.font = "16px Arial";
            const date = new Date().toLocaleString();
            ctx.fillText(date, 20, 465);

            // 4. Add Predictions to Image
            lastAveragedResults.forEach((res, index) => {
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 18px Arial";
                ctx.fillText(`${res.name}: ${res.prob}%`, 20, 510 + (index * 30));
            });

            // 5. Download the image
            const link = document.createElement('a');
            link.download = `Skin_Report_${Date.now()}.jpg`;
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.click();
        }
    </script>
</body>
</html>
