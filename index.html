<div>DermDx AI: Clinical Support Utility</div>
<button type="button" onclick="init()" class="start-btn">Start Analysis</button>
<div id="webcam-container"></div>
<div id="label-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "./"; // Pointing to the root where your 3 model files are
    let model, webcam, labelContainer, maxPredictions;
    
    // Smoothing & Logic Constants
    let predictionHistory = [];
    const HISTORY_SIZE = 10; 
    const CONFIDENCE_THRESHOLD = 0.70;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true; 
        webcam = new tmImage.Webcam(300, 300, flip); 
        await webcam.setup(); 
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        
        // Push current frame to history for smoothing
        predictionHistory.push(prediction);
        if (predictionHistory.length > HISTORY_SIZE) predictionHistory.shift();

        // Calculate averages across the last 10 frames
        let averagedResults = [];
        let topClass = { name: "", prob: 0 };

        for (let i = 0; i < maxPredictions; i++) {
            let sum = 0;
            for (let j = 0; j < predictionHistory.length; j++) {
                sum += predictionHistory[j][i].probability;
            }
            let avgProb = sum / predictionHistory.length;
            averagedResults.push({ name: prediction[i].className, prob: avgProb });
            
            if (avgProb > topClass.prob) {
                topClass = { name: prediction[i].className, prob: avgProb };
            }
        }

        // Logic: If 'Neither' is dominant OR confidence is too low, show "Inconclusive"
        if (topClass.name === "Neither" || topClass.prob < CONFIDENCE_THRESHOLD) {
            labelContainer.innerHTML = `
                <div style="background: #1e293b; color: #94a3b8; padding: 20px; border-radius: 12px; border: 2px dashed #475569; text-align: center;">
                    <span style="font-style: italic; font-weight: 500;">Analysis Inconclusive...</span>
                    <p style="font-size: 10px; margin-top: 8px; letter-spacing: 1px;">ADJUST FRAMING OR LIGHTING</p>
                </div>`;
        } else {
            // Display Medical Predictions (hiding the 'Neither' bar for a cleaner UI)
            let resultsHTML = "";
            averagedResults.forEach(res => {
                if (res.name !== "Neither") {
                    const isWinner = res.name === topClass.name;
                    const probDisplay = (res.prob * 100).toFixed(0);
                    const color = isWinner ? "#4ade80" : "#94a3b8";
                    const border = isWinner ? "2px solid #22c55e" : "1px solid #334155";
                    
                    resultsHTML += `
                        <div style="background: #1e293b; border: ${border}; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                            <span style="color: ${isWinner ? '#fff' : '#94a3b8'}; font-weight: ${isWinner ? 'bold' : 'normal'}">${res.name}</span>
                            <span style="color: ${color}; font-family: monospace; font-size: 20px;">${probDisplay}%</span>
                        </div>`;
                }
            });
            labelContainer.innerHTML = resultsHTML;
        }
    }
</script>
